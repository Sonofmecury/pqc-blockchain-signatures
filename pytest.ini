[pytest]
# Keep pytest's cache off the (flaky) cowork mounted filesystem to avoid a
# tempfile/symlink RecursionError seen during collection on that mount.
# If you still hit FS issues, run from a local path, e.g.:
#   pytest --basetemp=/tmp/pqc_pytest_tmp -p no:cacheprovider
addopts = -p no:cacheprovider -ra
cache_dir = /tmp/.pqc_pytest_cache
testpaths = tests
